name: Auto Release

on:
  push:
    tags:
      - 'v*.*.*'

# Least-privilege at the workflow level; jobs widen only what they need.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      # Pinned to a full commit SHA (v4.2.2) to prevent CI supply-chain attacks
      # via mutable-tag repointing (CWE-829).
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0

    - name: Set up Python
      # Pinned to a full commit SHA (v5).
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: "3.11"

    - name: Install build tooling
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Guard against PyPI-forbidden direct-URL dependencies
      run: |
        python -c "
        import glob, zipfile, sys
        bad = []
        for whl in glob.glob('dist/*.whl'):
            z = zipfile.ZipFile(whl)
            md = [n for n in z.namelist() if n.endswith('METADATA')][0]
            bad += [l for l in z.read(md).decode().splitlines() if l.startswith('Requires-Dist') and ('git+' in l or ' @ ' in l)]
        if bad:
            print('::error::PyPI forbids direct-URL deps:'); [print(' ', b) for b in bad]; sys.exit(1)
        print('OK: no direct-URL dependencies in built metadata')
        "

    - name: Upload build artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: dist
        path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC): no long-lived PYPI_API_TOKEN to steal.
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/strands-cosmos/
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI (Trusted Publishing / OIDC)
      # Official PyPA publisher; uses OIDC, no static token.
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
      with:
        packages-dir: dist/

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Extract version from tag
      id: get_version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Create GitHub Release
      # Pinned to a full commit SHA (v2.0.8).
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
      with:
        tag_name: ${{ github.ref_name }}
        name: strands-cosmos v${{ steps.get_version.outputs.version }}
        generate_release_notes: true
        body: |
          ## strands-cosmos v${{ steps.get_version.outputs.version }}

          NVIDIA Cosmos toolkit for Strands Agents — Cosmos 3 omnimodal (reasoning +
          generation) and Cosmos-Reason2 VLM.

          ### 📦 Installation
          ```bash
          pip install strands-cosmos==${{ steps.get_version.outputs.version }}
          ```

          ### 🔄 Upgrade
          ```bash
          pip install --upgrade strands-cosmos
          ```

          See [CHANGELOG.md](https://github.com/cagataycali/strands-cosmos/blob/main/CHANGELOG.md) for details.
        draft: false
        prerelease: false
