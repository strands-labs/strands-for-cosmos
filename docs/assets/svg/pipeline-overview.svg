<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#76b900"/>
      <stop offset="100%" stop-color="#4a7a00"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity=".1"/></filter>
  </defs>
  <rect width="800" height="400" fill="#fafafa" rx="16"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#222">strands-cosmos Pipeline</text>
  
  <!-- Agent circle -->
  <circle cx="400" cy="120" r="40" fill="url(#g1)" filter="url(#shadow)"/>
  <text x="400" y="115" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Strands</text>
  <text x="400" y="130" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Agent</text>
  
  <!-- Tool categories as nodes -->
  <g transform="translate(80,220)">
    <rect width="100" height="70" rx="12" fill="#fff" stroke="#76b900" stroke-width="2" filter="url(#shadow)"/>
    <text x="50" y="30" text-anchor="middle" font-size="20">🧠</text>
    <text x="50" y="50" text-anchor="middle" font-size="10" font-weight="600">Reason2</text>
    <text x="50" y="62" text-anchor="middle" font-size="8" fill="#666">VLM</text>
  </g>
  <line x1="400" y1="160" x2="130" y2="220" stroke="#76b900" stroke-width="1.5" opacity=".5"/>
  
  <g transform="translate(210,220)">
    <rect width="100" height="70" rx="12" fill="#fff" stroke="#76b900" stroke-width="2" filter="url(#shadow)"/>
    <text x="50" y="30" text-anchor="middle" font-size="20">🌍</text>
    <text x="50" y="50" text-anchor="middle" font-size="10" font-weight="600">Predict 2.5</text>
    <text x="50" y="62" text-anchor="middle" font-size="8" fill="#666">World Model</text>
  </g>
  <line x1="400" y1="160" x2="260" y2="220" stroke="#76b900" stroke-width="1.5" opacity=".5"/>
  
  <g transform="translate(340,220)">
    <rect width="100" height="70" rx="12" fill="#fff" stroke="#76b900" stroke-width="2" filter="url(#shadow)"/>
    <text x="50" y="30" text-anchor="middle" font-size="20">🎨</text>
    <text x="50" y="50" text-anchor="middle" font-size="10" font-weight="600">Transfer 2.5</text>
    <text x="50" y="62" text-anchor="middle" font-size="8" fill="#666">ControlNet</text>
  </g>
  <line x1="400" y1="160" x2="390" y2="220" stroke="#76b900" stroke-width="1.5" opacity=".5"/>
  
  <g transform="translate(470,220)">
    <rect width="100" height="70" rx="12" fill="#fff" stroke="#76b900" stroke-width="2" filter="url(#shadow)"/>
    <text x="50" y="30" text-anchor="middle" font-size="20">⚡</text>
    <text x="50" y="50" text-anchor="middle" font-size="10" font-weight="600">Edge Deploy</text>
    <text x="50" y="62" text-anchor="middle" font-size="8" fill="#666">TRT + FP8</text>
  </g>
  <line x1="400" y1="160" x2="520" y2="220" stroke="#76b900" stroke-width="1.5" opacity=".5"/>
  
  <g transform="translate(600,220)">
    <rect width="100" height="70" rx="12" fill="#fff" stroke="#76b900" stroke-width="2" filter="url(#shadow)"/>
    <text x="50" y="30" text-anchor="middle" font-size="20">📊</text>
    <text x="50" y="50" text-anchor="middle" font-size="10" font-weight="600">Evaluate</text>
    <text x="50" y="62" text-anchor="middle" font-size="8" fill="#666">FID/FVD/CSE</text>
  </g>
  <line x1="400" y1="160" x2="650" y2="220" stroke="#76b900" stroke-width="1.5" opacity=".5"/>
  
  <!-- Bottom label -->
  <text x="400" y="340" text-anchor="middle" font-size="12" fill="#666">21 tools · 6 Cosmos repos · 1 justfile · Jetson AGX Thor native</text>
  
  <!-- Animated pulse on agent -->
  <circle cx="400" cy="120" r="40" fill="none" stroke="#76b900" stroke-width="2" opacity="0">
    <animate attributeName="r" values="40;60" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>