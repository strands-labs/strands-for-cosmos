<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" font-family="Inter, system-ui, sans-serif">
  <rect width="600" height="220" fill="#fafafa" rx="12"/>
  <text x="300" y="25" text-anchor="middle" font-size="13" font-weight="700">Jetson Edge Deployment</text>
  
  <!-- Thor box -->
  <rect x="20" y="45" width="260" height="150" rx="12" fill="#fff" stroke="#264653" stroke-width="2"/>
  <text x="150" y="68" text-anchor="middle" font-size="11" font-weight="600" fill="#264653">Jetson AGX Thor</text>
  <text x="150" y="83" text-anchor="middle" font-size="9" fill="#666">NVIDIA Thor GPU · 132GB unified</text>
  
  <!-- Inside Thor -->
  <rect x="35" y="95" width="100" height="35" rx="6" fill="#76b900" opacity=".15" stroke="#76b900"/>
  <text x="85" y="116" text-anchor="middle" font-size="9" font-weight="500">Reason2-2B</text>
  
  <rect x="145" y="95" width="55" height="35" rx="6" fill="#e76f51" opacity=".15" stroke="#e76f51"/>
  <text x="172" y="116" text-anchor="middle" font-size="8" font-weight="500">FP8</text>
  
  <rect x="210" y="95" width="55" height="35" rx="6" fill="#264653" opacity=".15" stroke="#264653"/>
  <text x="237" y="116" text-anchor="middle" font-size="8" font-weight="500">TRT</text>
  
  <!-- Perf numbers -->
  <text x="85" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#76b900">1.4s</text>
  <text x="85" y="172" text-anchor="middle" font-size="9" fill="#666">text gen</text>
  <text x="195" y="155" text-anchor="middle" font-size="22" font-weight="700" fill="#76b900">2.2s</text>
  <text x="195" y="172" text-anchor="middle" font-size="9" fill="#666">video caption</text>
  
  <!-- Setup steps -->
  <rect x="310" y="45" width="270" height="150" rx="12" fill="#1a1a1a"/>
  <text x="445" y="68" text-anchor="middle" font-size="10" fill="#76b900" font-weight="600">Quick Setup</text>
  <text x="325" y="90" font-size="9" fill="#e8e8e8" font-family="monospace">$ pip install strands-cosmos</text>
  <text x="325" y="108" font-size="9" fill="#e8e8e8" font-family="monospace">$ strands-cosmos-fix-cublas</text>
  <text x="325" y="126" font-size="9" fill="#e8e8e8" font-family="monospace">$ just setup-full</text>
  <text x="325" y="144" font-size="9" fill="#e8e8e8" font-family="monospace">$ just doctor</text>
  <text x="325" y="168" font-size="9" fill="#76b900" font-family="monospace">✅ All green — ready to infer</text>
</svg>