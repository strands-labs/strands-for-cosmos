<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" font-family="Inter, system-ui, sans-serif">
  <rect width="600" height="200" fill="#fafafa" rx="12"/>
  <text x="300" y="25" text-anchor="middle" font-size="13" font-weight="700">Chain-of-Thought Reasoning</text>
  
  <!-- Input -->
  <rect x="20" y="45" width="170" height="60" rx="8" fill="#264653"/>
  <text x="105" y="70" text-anchor="middle" font-size="9" fill="#fff" font-weight="500">"What will happen if</text>
  <text x="105" y="83" text-anchor="middle" font-size="9" fill="#fff" font-weight="500">the ball rolls off?"</text>
  <text x="105" y="98" text-anchor="middle" font-size="8" fill="#aaa">User prompt</text>
  
  <!-- Think block -->
  <rect x="210" y="45" width="180" height="60" rx="8" fill="#fff" stroke="#f5a623" stroke-width="2" stroke-dasharray="4"/>
  <text x="300" y="62" text-anchor="middle" font-size="8" fill="#f5a623" font-weight="600">&lt;think&gt;</text>
  <text x="300" y="76" text-anchor="middle" font-size="8" fill="#666">1. Ball at edge → unstable</text>
  <text x="300" y="88" text-anchor="middle" font-size="8" fill="#666">2. Gravity → downward force</text>
  <text x="300" y="100" text-anchor="middle" font-size="8" fill="#666">3. No support → free fall</text>
  
  <!-- Output -->
  <rect x="410" y="45" width="170" height="60" rx="8" fill="#76b900" opacity=".15" stroke="#76b900" stroke-width="1.5"/>
  <text x="495" y="68" text-anchor="middle" font-size="9" fill="#333" font-weight="500">"The ball will fall</text>
  <text x="495" y="81" text-anchor="middle" font-size="9" fill="#333" font-weight="500">due to gravity..."</text>
  <text x="495" y="98" text-anchor="middle" font-size="8" fill="#76b900" font-weight="600">Final answer</text>
  
  <!-- Arrows -->
  <line x1="190" y1="75" x2="210" y2="75" stroke="#76b900" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="390" y1="75" x2="410" y2="75" stroke="#76b900" stroke-width="1.5" marker-end="url(#a)"/>
  
  <!-- Code example -->
  <rect x="20" y="125" width="560" height="55" rx="8" fill="#1a1a1a"/>
  <text x="35" y="145" font-size="10" fill="#76b900" font-family="JetBrains Mono, monospace">model = CosmosVisionModel(reasoning=True)</text>
  <text x="35" y="162" font-size="10" fill="#e8e8e8" font-family="JetBrains Mono, monospace">agent = Agent(model=model)</text>
  <text x="35" y="172" font-size="9" fill="#888" font-family="JetBrains Mono, monospace"># Response includes &lt;think&gt;...&lt;/think&gt; then final answer</text>
</svg>